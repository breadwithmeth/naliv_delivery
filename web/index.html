  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];

    (function () {
      var oneSignalAppId = "f9a3bf44-4a96-4859-99a9-37aa2b579577";
      var initPromise = null;

      function withOneSignal(callback, fallback) {
        return new Promise(function (resolve) {
          window.OneSignalDeferred.push(async function (OneSignal) {
            try {
              if (!initPromise) {
                initPromise = OneSignal.init({
                  appId: oneSignalAppId,
                  serviceWorkerPath: "onesignal/OneSignalSDKWorker.js",
                  serviceWorkerParam: { scope: "/onesignal/" },
                  allowLocalhostAsSecureOrigin: true,
                  notifyButton: {
                    enable: false
                  }
                });
              }

              await initPromise;
              resolve(await callback(OneSignal));
            } catch (error) {
              console.error("OneSignal web error", error);
              resolve(fallback);
            }
          });
        });
      }

      window.GradusyOneSignal = {
        init: function () {
          return withOneSignal(async function (OneSignal) {
            return await OneSignal.Notifications.isPushSupported();
          }, false);
        },
        requestPermission: function () {
          return withOneSignal(async function (OneSignal) {
            if (!(await OneSignal.Notifications.isPushSupported())) {
              return false;
            }

            if (!OneSignal.Notifications.permission) {
              await OneSignal.Notifications.requestPermission();
            }

            if (OneSignal.Notifications.permission) {
              await OneSignal.User.PushSubscription.optIn();
            }

            return OneSignal.Notifications.permission === true &&
              OneSignal.User.PushSubscription.optedIn === true;
          }, false);
        },
        getSubscriptionId: function () {
          return withOneSignal(async function (OneSignal) {
            return OneSignal.User.PushSubscription.id || null;
          }, null);
        },
        getPushToken: function () {
          return withOneSignal(async function (OneSignal) {
            return OneSignal.User.PushSubscription.token || null;
          }, null);
        },
        login: function (externalId) {
          return withOneSignal(async function (OneSignal) {
            await OneSignal.login(externalId);
            return true;
          }, false);
        },
        logout: function () {
          return withOneSignal(async function (OneSignal) {
            await OneSignal.logout();
            return true;
          }, false);
        },
        addTag: function (key, value) {
          return withOneSignal(async function (OneSignal) {
            await OneSignal.User.addTag(key, String(value));
            return true;
          }, false);
        },
        removeTag: function (key) {
          return withOneSignal(async function (OneSignal) {
            await OneSignal.User.removeTag(key);
            return true;
          }, false);
        }
      };
    })();
  </script>

  <script id="splash-screen-script">
    var __splashRemoved = false;
    function removeSplashFromWeb() {
      if (__splashRemoved) return;
      __splashRemoved = true;
      var el = document.getElementById("splash");
      if (el) {
        el.classList.add("removing");
        setTimeout(function () { el.remove(); }, 450);
      }
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    // Fallback: watch for Flutter root element in the DOM
    (function () {
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) {
          obs.disconnect();
          removeSplashFromWeb();
        }
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });
      // Ultimate safety net: remove splash after 15 seconds no matter what
      setTimeout(function () {
        obs.disconnect();
        removeSplashFromWeb();
      }, 15000);
    })();
  </script>

  <script>
    (function () {
      var dismissedKey = "gradusy24_ios_open_dismissed";

      function isIOS() {
        var ua = navigator.userAgent || "";
        return /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      }

      function shouldSkip() {
        var params = new URLSearchParams(window.location.search);
        return !isIOS() || window.navigator.standalone === true || params.get("web") === "1";
      }

      function appUrl() {
        return "gradusy24://app" + window.location.pathname + window.location.search + window.location.hash;
      }

      function openApp() {
        window.location.href = appUrl();
      }

      function getSessionValue(key) {
        try {
          return sessionStorage.getItem(key);
        } catch (_) {
          return null;
        }
      }

      function setSessionValue(key, value) {
        try {
          sessionStorage.setItem(key, value);
        } catch (_) {
          // Opening the native app is best-effort; storage failures should not block the site.
        }
      }

      function hidePrompt() {
        var prompt = document.getElementById("ios-app-open");
        if (prompt) {
          prompt.hidden = true;
        }
      }

      if (shouldSkip()) {
        return;
      }

      document.addEventListener("DOMContentLoaded", function () {
        var prompt = document.getElementById("ios-app-open");
        var openButton = document.getElementById("ios-app-open-button");
        var continueButton = document.getElementById("ios-app-continue-button");
        if (!prompt || !openButton || !continueButton) {
          return;
        }

        if (getSessionValue(dismissedKey) !== "1") {
          prompt.hidden = false;
        }

        openButton.addEventListener("click", function () {
          openApp();
        });

        continueButton.addEventListener("click", function () {
          setSessionValue(dismissedKey, "1");
          hidePrompt();
        });
      });
    })();
  </script>
