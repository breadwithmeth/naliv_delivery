# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/logo/24.png"

  android: "launcher_icon"
  min_sdk_android: 21

  ios: true
  remove_alpha_ios: true

  web:
    generate: true
    image_path: "assets/logo/24.png"
    background_color: "#121212"
    theme_color: "#121212"

  windows:
    generate: true
    image_path: "assets/logo/24.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/logo/24.png"
