  <style id="splash-screen-style">
    :root {
      --bg-deep: #121212;
      --bg-top: #161616;
      --card: #1e1e1e;
      --orange: #f6a10c;
      --text: #ffffff;
      --text-mute: #9fb0c8;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      height: 100%;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-deep) 100%);
    }

    body {
      overflow: hidden;
      font-family: "Raleway", "Segoe UI", sans-serif;
    }

    /* ── fullscreen overlay ─── */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 15%, rgba(246, 161, 12, 0.06), transparent 40%),
        radial-gradient(circle at 80% 85%, rgba(255, 255, 255, 0.03), transparent 40%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-deep) 100%);
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #splash.removing {
      opacity: 0;
      pointer-events: none;
    }

    /* ── glowing icon ─────── */
    .sp-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(246, 161, 12, 0.12), transparent 70%);
      animation: sp-icon-in 0.7s ease-out, sp-glow 2.4s ease-in-out 0.7s infinite;
    }

    .sp-icon-inner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--card);
      border: 1.5px solid rgba(246, 161, 12, 0.25);
      display: grid;
      place-items: center;
      box-shadow: 0 0 20px rgba(246, 161, 12, 0.12);
    }

    .sp-icon-inner svg {
      width: 24px;
      height: 24px;
    }

    /* ── text ──────────────── */
    .sp-title {
      margin: 28px 0 8px;
      color: var(--text);
      font-size: 21px;
      font-weight: 800;
      letter-spacing: 0.02em;
      animation: sp-fade-up 0.6s ease-out 0.15s both;
    }

    .sp-tagline {
      margin: 0 auto;
      max-width: 280px;
      color: var(--text-mute);
      font-size: 13px;
      line-height: 1.55;
      text-align: center;
      animation: sp-fade-up 0.6s ease-out 0.35s both;
    }

    /* ── progress bar ─────── */
    .sp-bar-wrap {
      width: 180px;
      height: 3px;
      margin-top: 32px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
      animation: sp-fade-up 0.5s ease-out 0.55s both;
    }

    .sp-bar-shimmer {
      width: 40%;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      animation: sp-shimmer 2s ease-in-out infinite;
    }

    /* ── rotating fact ────── */
    .sp-fact {
      margin-top: 18px;
      color: var(--orange);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      min-height: 18px;
      animation: sp-fade-up 0.5s ease-out 0.7s both;
    }

    .sp-fact span {
      display: inline-block;
      animation: sp-fact-cycle 14s step-end infinite;
    }

    /* ── keyframes ─────────── */
    @keyframes sp-icon-in {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes sp-glow {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.06);
      }
    }

    @keyframes sp-fade-up {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes sp-shimmer {
      0% {
        transform: translateX(-180px);
      }

      100% {
        transform: translateX(360px);
      }
    }

    @keyframes sp-fact-cycle {
      0% {
        content: "";
      }

      /* JS handles text rotation */
    }
  </style>
  <script id="splash-screen-script">
    var __splashRemoved = false;
    function removeSplashFromWeb() {
      if (__splashRemoved) return;
      __splashRemoved = true;
      var el = document.getElementById("splash");
      if (el) {
        el.classList.add("removing");
        setTimeout(function () { el.remove(); }, 450);
      }
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
    // Fallback: watch for Flutter root element in the DOM
    (function () {
      var obs = new MutationObserver(function () {
        if (document.querySelector('flutter-view, flt-glass-pane')) {
          obs.disconnect();
          removeSplashFromWeb();
        }
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });
      // Ultimate safety net: remove splash after 15 seconds no matter what
      setTimeout(function () {
        obs.disconnect();
        removeSplashFromWeb();
      }, 15000);
    })();
  </script>

  <script>
    // Rotate facts in the splash
    (function () {
      var facts = [
        "Доставка 24/7",
        "Более 3\u00A0000 позиций алкоголя",
        "Доставка за 35 минут",
        "Свежее разливное пиво",
        "Элитный алкоголь 21+",
        "Собственная система лояльности"
      ];
      var i = 0;
      var el = document.getElementById("sp-fact-text");
      if (!el) return;
      setInterval(function () {
        i = (i + 1) % facts.length;
        el.style.opacity = "0";
        el.style.transform = "translateY(6px)";
        el.style.transition = "opacity 0.3s, transform 0.3s";
        setTimeout(function () {
          el.textContent = facts[i];
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        }, 300);
      }, 2800);
    })();
  </script>
