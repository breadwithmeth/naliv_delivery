<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сервер временно недоступен</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(180deg, #161616 0%, #121212 100%);
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .card {
            width: min(420px, calc(100vw - 32px));
            padding: 28px;
            border-radius: 24px;
            background: rgba(30, 30, 30, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.28);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 28px;
        }

        p {
            margin: 0;
            color: #9fb0c8;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <main class="card">
        <h1>Сервис временно недоступен</h1>
        <p>Попробуйте обновить страницу через минуту. Если ошибка повторяется, проверьте nginx и backend API.</p>
    </main>
</body>

</html>
